# fly.toml app configuration file generated for koda-db-fly on 2026-06-17T20:33:04Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'koda-db-fly'
primary_region = 'iad'

[build]

[env]
  SCYLLA_MEMORY = '3G'
  SCYLLA_SMP = '2'

[[mounts]]
  source = 'scylla_data'
  destination = '/var/lib/scylla'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  size = 'performance-2x'
  memory = '4gb'
