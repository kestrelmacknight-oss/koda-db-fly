app            = "koda-db-fly"
primary_region = "iad"

[build]
  # Uses the Dockerfile in this directory

[env]
  SCYLLA_SMP    = "2"
  SCYLLA_MEMORY = "1500M"

[[vm]]
  size   = "performance-2x"
  memory = "4096"

[[mounts]]
  source      = "scylla_data"
  destination = "/var/lib/scylla"

# Explicitly declaring the CQL port for Fly's private network.
# Every entrypoint/address-binding fix so far has been confirmed
# correct from inside this machine -- 150 consecutive connection
# attempts from koda-server have still all failed, which points at
# something in how this port is exposed to Fly's network fabric
# itself, not at ScyllaDB's own configuration.
[[services]]
  internal_port = 9042
  protocol       = "tcp"

  [[services.ports]]
    port = 9042
