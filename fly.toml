app            = "koda-db-fly"
primary_region = "iad"

[build]
  # Uses the Dockerfile in this directory

[env]
  SCYLLA_SMP    = "2"
  SCYLLA_MEMORY = "1500M"

[[vm]]
  size   = "performance-2x"
  memory = "4096"

[[mounts]]
  source      = "scylla_data"
  destination = "/var/lib/scylla"

# Intentionally public -- Xandra's hardcoded IPv4 DNS resolution made
# Fly's IPv6-only private network unworkable for this connection.
# Exposing this port publicly is only safe because PasswordAuthenticator
# is now genuinely enforced (confirmed working with the koda_app role).
[[services]]
  internal_port = 9042
  protocol       = "tcp"

  [[services.ports]]
    port = 9042
